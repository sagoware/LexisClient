plugins {
    id 'fabric-loom' version '1.9-SNAPSHOT'
    id 'maven-publish'
}

version = "1.0.0"
group = "com.lexis"

base {
    // Hataya sebep olan değişkeni doğrudan el ile "Lexis" yaptık
    archivesName = "Lexis"
}

repositories {
    mavenCentral()
}

dependencies {
    // Minecraft ve Fabric Loader Bağımlılıkları (1.21.4)
    minecraft "com.mojang:minecraft:1.21.4"
    mappings "net.fabricmc:yarn:1.21.4+build.2:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.10"

    // Fabric API
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.114.0+1.21.4"
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

java {
    withSourcesJar()

    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    from("LICENSE") {
        rename { "${it}_Lexis" }
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }
}